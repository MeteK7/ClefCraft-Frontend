<div class="registration-container">
    <h2>Register</h2>
    <form (ngSubmit)="onSubmit()" #registrationForm="ngForm">
      <div>
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" [(ngModel)]="firstName" name="firstName" required />
      </div>
      <div>
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" [(ngModel)]="lastName" name="lastName" required />
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" required />
      </div>
      <div>
        <label for="userName">Username</label>
        <input type="text" id="userName" [(ngModel)]="userName" name="userName" required />
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" required />
      </div>
      <button type="submit" [disabled]="!registrationForm.form.valid">Register</button>
    </form>
    <div class="login">
      <p>Already a member? <a routerLink="/login">Login!</a></p>
  </div>
    <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
  </div>
