<div class="auth-container">
  <div class="auth-card">

    <h2>Login</h2>
    <p class="subtitle">Welcome back! Please sign in.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="on">

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" formControlName="email" placeholder="Enter email" autocomplete="email" />

        <small class="error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Valid email is required
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>

        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" name="password" formControlName="password"
            placeholder="Enter password" autocomplete="new-password" />

          <button type="button" class="toggle" (click)="togglePassword()">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>

        <small class="error" *ngIf="form.controls.password.touched && form.controls.password.invalid">
          Password must be at least 6 characters
        </small>
      </div>

      <!-- Submit -->
      <button type="submit" [disabled]="form.invalid || isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

    <div class="footer">
      <p>New user? <a routerLink="/registration">Create account</a></p>
    </div>

  </div>
</div>
