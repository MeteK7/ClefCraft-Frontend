<nav [class.collapsed]="isCollapsed">
  <button class="collapse-btn" (click)="toggleCollapse()">
    <mat-icon [class.rotated]="isCollapsed">chevron_left</mat-icon>
  </button>

  <ul>
    <li>
      <a routerLink="/login" routerLinkActive="active-link">
        <span class="icon">🔐</span>
        <span class="label">Login</span>
      </a>
    </li>

    <li>
      <a routerLink="/calendar" routerLinkActive="active-link">
        <span class="icon">📅</span>
        <span class="label">Calendar</span>
      </a>
    </li>

    <li>
      <a routerLink="/board" routerLinkActive="active-link">
        <span class="icon">📋</span>
        <span class="label">Board</span>
      </a>
    </li>

    <li *ngIf="isAdmin">
      <a routerLink="/management" routerLinkActive="active-link">
        <span class="icon">⚙️</span>
        <span class="label">Management</span>
      </a>
    </li>
  </ul>

  <div class="user-info" *ngIf="userFullName">
    👤 {{ userFullName }}
  </div>

  <button *ngIf="authService.isLoggedIn()" class="logout-btn" (click)="logout()">
    <span class="label">Sign Out</span>
    <mat-icon>logout</mat-icon>
  </button>
</nav>
