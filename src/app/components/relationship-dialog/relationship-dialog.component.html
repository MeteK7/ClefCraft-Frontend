<h2 mat-dialog-title>

    Add Relationship

</h2>

<mat-dialog-content>

    <mat-form-field appearance="outline" class="full-width">

        <mat-label>

            Relationship Type

        </mat-label>

        <mat-select formControlName="relationType">

            <mat-option
                *ngFor="let type of relationTypes"
                [value]="type.value">

                {{type.name}}

            </mat-option>

        </mat-select>

    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">

        <mat-label>

            Search Item

        </mat-label>

        <input
            matInput
            formControlName="search">

    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">

        <mat-label>

            Select Item

        </mat-label>

        <mat-select formControlName="targetItemId">

            <mat-option
                *ngFor="let item of candidates"
                [value]="item.id">

                #{{item.id}}
                {{item.title}}
                ({{item.status}})

            </mat-option>

        </mat-select>

    </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button
        mat-button
        (click)="cancel()">

        Cancel

    </button>

    <button
        mat-raised-button
        color="primary"
        (click)="create()">

        Create

    </button>

</mat-dialog-actions>
