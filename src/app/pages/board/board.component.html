<!-- components/board/board.component.html -->
<div class="board-header">
  <label for="boardId">Board:</label>
  <select id="boardId" [(ngModel)]="selectedBoardId" name="boardId" (change)="onBoardSelection(selectedBoardId)">
    <option *ngFor="let board of boards" [value]="board.id">{{ board.title }}</option>
  </select>
  <div class="view-toggle">
    <button [class.active]="viewMode === 'dialog'" (click)="viewMode = 'dialog'">
      Dialog
    </button>

    <button [class.active]="viewMode === 'sidebar'" (click)="viewMode = 'sidebar'">
      Sidebar
    </button>
  </div>
</div>

    <option value="dialog">Dialog</option>

</div> -->

<button class="add-item-btn" (click)="openAddItemDialog()">Add New Item</button>

<div class="board-columns">
  <app-board-column *ngFor="let column of columns" [column]="column" [allColumnIds]="allColumnIds"
    (itemClicked)="onItemClick($event)"></app-board-column>
</div>

<!-- Sidebar View -->
<app-item-detail-sidebar *ngIf="viewMode === 'sidebar' && selectedItem" [item]="selectedItem"
  (itemUpdated)="onItemUpdated($event)"></app-item-detail-sidebar>
