<div class="dialog-container">
  <h2 class="dialog-title">Item Details</h2>

  <mat-tab-group>
    <mat-tab label="Details">
      <div class="dialog-content">
        <div class="form-group">
          <label for="itemTitle">Title:</label>
          <input id="itemTitle" class="input-field" [(ngModel)]="data.item.title" />
        </div>

        <div class="form-group">
          <label for="itemDescription">Description:</label>
          <textarea id="itemDescription" class="input-field" [(ngModel)]="data.item.description"></textarea>
        </div>

        <!-- Due Date -->
        <div class="form-group">
          <label for="dueDate">Due Date:</label>
          <input id="dueDate" type="date" class="input-field" [(ngModel)]="data.item.dueDate" />
        </div>

        <!-- Priority -->
        <div class="form-group">
          <label for="priority">Priority:</label>
          <mat-radio-group [(ngModel)]="data.item.priority">
            <mat-radio-button *ngFor="let priority of priorities" [value]="priority">
              {{ priority }}
            </mat-radio-button>
          </mat-radio-group>
        </div>

        <!-- Status -->
        <div class="form-group">
          <label for="status">Status:</label>
          <mat-select [(ngModel)]="data.item.status">
            <mat-option *ngFor="let status of statuses" [value]="status">
              {{ status }}
            </mat-option>
          </mat-select>
        </div>

        <!-- Assignee -->
        <div class="form-group">
          <label for="assignee">Assignee:</label>
          <mat-select [(ngModel)]="data.item.assignee">
            <mat-option *ngFor="let assignee of availableAssignees" [value]="assignee">
              {{ assignee }}
            </mat-option>
          </mat-select>
        </div>

        <!-- Tags -->
        <div class="form-group">
          <label>Tags:</label>
          <div class="tags-container">
            <span *ngFor="let tag of data.item.tags" class="tag">
              {{ tag }} <button (click)="removeTag(tag)">x</button>
            </span>
          </div>
          <input placeholder="Add tag" #tagInput (keyup.enter)="addTag(tagInput.value); tagInput.value=''" />
        </div>

        <!-- Time Tracking -->
        <div class="form-group">
          <label for="estimatedTime">Estimated Time (hrs):</label>
          <input id="estimatedTime" type="number" class="input-field" [(ngModel)]="data.item.estimatedTime" />
        </div>

        <div class="form-group">
          <label for="timeSpent">Time Spent (hrs):</label>
          <input id="timeSpent" type="number" class="input-field" [(ngModel)]="data.item.timeSpent" />
        </div>
      </div>
    </mat-tab>

    <!-- History Tab -->
    <mat-tab label="History">
      <div class="history-tab">
        <h5>Work History</h5>
        <ul>
          <li *ngFor="let historyItem of markAsWorkedHistory">
            {{ historyItem.dateCreated | date: 'short' }} - {{ historyItem.actionBy }}
          </li>
        </ul>
      </div>
    </mat-tab>
  </mat-tab-group>

  <div class="dialog-actions">
    <button class="btn save-btn" (click)="onSave()">Save</button>
    <button class="btn delete-btn" (click)="onDelete()">Delete</button>
    <button class="btn cancel-btn" (click)="onCancel()">Cancel</button>
    <button class="btn mark-as-worked-btn" (click)="markAsWorked()">Mark as Worked</button>
  </div>
</div>
