<div class="dialog-container"> <!-- Add the container class here -->
  <h2 class="dialog-title">Item Details</h2>
  <div class="dialog-content">
    <div class="form-group">
      <label for="itemTitle">Title:</label>
      <input id="itemTitle" class="input-field" [(ngModel)]="data.item.title" placeholder="Enter item title" />
    </div>

    <div class="form-group">
      <label for="itemDescription">Description:</label>
      <textarea id="itemDescription" class="input-field" [(ngModel)]="data.item.description"
        placeholder="Enter item description"></textarea>
    </div>

    <div class="info-group">
      <div>
        <label>Created On:</label>
        <p>{{ data.item.dateCreated | date:'short' }}</p>
      </div>
      <div>
        <label>Last Modified:</label>
        <p>{{ data.item.dateModified | date:'short' }}</p>
      </div>
      <div>
        <label>Last Modified By:</label>
        <p>{{ data.item.modifiedByFullName }}</p>
      </div>
      <div>
        <label>Created By:</label>
        <p>{{ data.item.createdByFullName }}</p>
      </div>
    </div>

    <div class="linked-items">
      <label>Linked Items:</label>
      <ul>
        <li *ngFor="let linkedItem of data.item.linkedItems">
          {{ linkedItem.title }} <!-- Ensure linkedItem is an object with a title -->
        </li>
      </ul>
    </div>
  </div>

  <div class="dialog-actions">
    <button class="btn save-btn" (click)="onSave()">Save</button>
    <button class="btn delete-btn" (click)="onDelete()">Delete</button>
    <button class="btn cancel-btn" (click)="onCancel()">Cancel</button>
  </div>
</div>
