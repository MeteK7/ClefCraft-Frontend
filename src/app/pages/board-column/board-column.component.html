<div class="board-column">
  <h2>{{ column.title }}</h2>
  <div cdkDropListGroup>
    <div
      class="item-list"
      cdkDropList
      [cdkDropListData]="column.boardItems"
      [cdkDropListConnectedTo]="connectedTo"
      (cdkDropListDropped)="drop($event)"
      [id]="column.dropListId"
    >
      <app-board-item
        *ngFor="let item of column.boardItems"
        [item]="item"
        (click)="onItemClick(item)"
        cdkDrag
      ></app-board-item>
    </div>
  </div>
</div>
