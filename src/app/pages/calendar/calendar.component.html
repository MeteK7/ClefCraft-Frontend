<div class="calendar-top-bar">
  <!-- Title + back -->
  <div class="calendar-header">
    <h1>Calendar</h1>
    <!--<button mat-button (click)="navigateToBoard()">Back to Board</button>-->
  </div>

  <!-- Selected date summary -->
  <div class="selected-date-summary">
    <h3>{{ selectedDate | date: 'EEEE, MMMM d, y' }}</h3>
    <p>
      Week {{ getWeekNumber(selectedDate) }}, day {{ getDayOfYear(selectedDate) }} of the year
    </p>
  </div>

  <!-- Datepicker -->
  <div class="calendar-container">
    <mat-form-field appearance="outline">
      <mat-label>Select a date</mat-label>
      <input matInput [matDatepicker]="picker" (dateChange)="onDateSelectedFromPicker($event.value)" />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
  </div>
</div>

<!-- Calendar Navigation -->
<div class="calendar-navigation">
  <button mat-button (click)="goToPreviousMonth()">Previous</button>
  <button mat-button (click)="goToToday()">Today</button>
  <button mat-button (click)="goToNextMonth()">Next</button>
</div>

<!-- Calendar Grid -->
<table class="calendar-grid">
  <thead>
    <tr>
      <th *ngFor="let day of weekdays">{{ day }}</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let row of calendarGrid">
      <td *ngFor="let date of row" class="calendar-day"
        [class.outside-month]="date.getMonth() !== selectedDate.getMonth()"
        [class.selected]="isSameDate(date, selectedDate)">
        <div class="day" (click)="onEmptyDayClicked(date)">
          <span>{{ date.getDate() }}</span>

          <div class="events">
            <div *ngFor="let event of getEventsForDay(date)" class="event" [class.linked]="event.linkedBoardItemId"
              [ngStyle]="event.eventColor ? {'border-left': '6px solid ' + event.eventColor} : {}"
              [matTooltip]="getTooltip(event)" (click)="onEventClicked(event, $event)">
              <span class="event-title">
                <mat-icon *ngIf="event.linkedBoardItemId" class="linked-icon">link</mat-icon>
                {{ event.subject }}
              </span>
            </div>
          </div>
        </div>
      </td>
    </tr>
  </tbody>
</table>
